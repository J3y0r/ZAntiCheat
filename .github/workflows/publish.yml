name: Release

on:
  push:
    branches:
      - "main"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "microsoft"

      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v2

      - name: Make Gradle wrapper executable
        run: chmod +x "./gradlew"

      - name: Resolve release metadata
        id: metadata
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          VERSION="$(sed -n "s/^version = '\([^']*\)'$/\1/p" "./build.gradle" | head -n 1)"
          if [ -z "$VERSION" ]; then
            echo "Failed to resolve project version from build.gradle" >&2
            exit 1
          fi

          PREFIX="v${VERSION}-fix."
          VERSION_PATTERN="$(printf '%s' "$VERSION" | sed 's/[.[\*^$()+?{|]/\\&/g')"
          EXISTING_TAGS="$(gh release list --repo "$REPOSITORY" --limit 1000 --json tagName --jq '.[].tagName')"
          NEXT_FIX="$(printf '%s\n' "$EXISTING_TAGS" \
            | grep -E "^v${VERSION_PATTERN}-fix\\.[0-9]+$" \
            | sed -E "s/^v${VERSION_PATTERN}-fix\\.([0-9]+)$/\1/" \
            | sort -n \
            | tail -n 1 || true)"

          if [ -z "$NEXT_FIX" ]; then
            NEXT_FIX=1
          else
            NEXT_FIX=$((NEXT_FIX + 1))
          fi

          TAG_NAME="${PREFIX}${NEXT_FIX}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Build shadow jar
        run: ./gradlew shadowJar

      - name: Resolve release asset
        id: asset
        run: |
          ASSET_PATH="$(find "./build/libs" -maxdepth 1 -type f -name "*.jar" | head -n 1)"
          if [ -z "$ASSET_PATH" ]; then
            echo "No jar artifact found in build/libs" >&2
            exit 1
          fi

          echo "asset_path=$ASSET_PATH" >> "$GITHUB_OUTPUT"
          echo "asset_name=$(basename "$ASSET_PATH")" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.metadata.outputs.tag_name }}
          ASSET_PATH: ${{ steps.asset.outputs.asset_path }}
        run: |
          gh release create "$TAG_NAME" \
            "$ASSET_PATH" \
            --repo "${{ github.repository }}" \
            --title "$TAG_NAME" \
            --notes "Automated release for ${TAG_NAME}."
