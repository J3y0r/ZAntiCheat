# 是否启用该功能或检测项。
enabled: true
# 是否启用静默模式；启用后通常只记录或处理，不主动打扰玩家。
silent-mode: false

## Customizable plugin messages
# 插件消息配置。
messages:
  # 消息前缀，支持颜色代码和全局占位符。
  prefix: "&8(&#FF450EZAC&8)&f"
  # Hex colors are supported since MC 1.16. Example: &#FF450E
  # In MC 1.13-1.15, the hex colors are replaced with the nearest Bukkit colors
  # 是否解析 &#RRGGBB 格式的十六进制颜色。
  hex-color-codes: true
  # A local placeholder is a placeholder that can only be used in the following message
  # All the global placeholder can be found below
  # 命令执行成功或信息查询时返回的消息。
  command-messages:
    help:
      # 发送给玩家、管理员、控制台或外部服务的消息模板。
      message: "%prefix% ZAntiCheat %version% is running"
    reload:
      # Local placeholders: %time%
      # 发送给玩家、管理员、控制台或外部服务的消息模板。
      message: "%prefix% Successfully reloaded the config &7(%time%ms)"
    # 游戏内告警相关配置。
    alerts:
      # 开启该状态时显示的消息。
      toggled-on-message: "%prefix% Alerts are enabled!"
      # 关闭该状态时显示的消息。
      toggled-off-message: "%prefix% Alerts are disabled!"
    tps:
      # Local placeholders: %tps%
      # 发送给玩家、管理员、控制台或外部服务的消息模板。
      message: "%prefix% TPS from the last 30 seconds: &f%tps%"
    ping:
      # Local placeholders: %ping%, %connection-stability%
      # 发送给玩家、管理员、控制台或外部服务的消息模板。
      message: "%prefix% %name%&7's ping is &f%ping% &7(&f%connection-stability%&7 stability)"
      # 连接稳定性文案分级。
      connection-stability:
        # 高连接稳定性时显示的文本。
        high: "&ahigh&r"
        # 中等连接稳定性时显示的文本。
        medium: "&emedium&r"
        # 低连接稳定性时显示的文本。
        low: "&clow&r"
    client:
      # Local placeholders: %client-brand%
      # 发送给玩家、管理员、控制台或外部服务的消息模板。
      message: "%prefix% %name%&7's client is &f%client-brand%"
    cps:
      # Local placeholders: %cps%
      # 发送给玩家、管理员、控制台或外部服务的消息模板。
      message: "%prefix% %name%&7's CPS is &f%cps%"
    # 所有反作弊检测项配置。
    checks:
      # Local placeholders: %checks%, %movement_checks%, %combat_checks%,
      # %interaction_checks%, %inventory_checks%, %packet_checks%
      # 发送给玩家、管理员、控制台或外部服务的消息模板。
      message: "%prefix% Checks: %checks%"
    report:
      # 发送给玩家、管理员、控制台或外部服务的消息模板。
      message: "%prefix% %name% &7is now being monitored"
  # 命令或权限校验失败时返回的错误消息。
  error-messages:
    # 缺少权限时显示的错误消息。
    no-permission: "%prefix% You don't have enough permissions"
    # Local placeholders: %usage%
    # 命令格式错误时显示的用法提示。
    invalid-format: "%prefix% Usage: &7%usage%"

## In game notifications of violations or/and punishments
# 游戏内告警相关配置。
alerts:
  # 玩家触发检测时的游戏内广播配置。
  broadcast-violations:
    # 是否启用该功能或检测项。
    enabled: true
    # 发送给玩家、管理员、控制台或外部服务的消息模板。
    message: "%prefix% %name% was flagged for %check% (%vio%/%punishment-vio%)"
    # Broadcasts violations of a player no more than 1 time in X ms
    # 同类消息或动作的冷却时间，单位为毫秒。
    cooldown: 0
    # Leave this field empty not to hover any text
    # 鼠标悬停在聊天消息上时显示的文本；留空则不显示。
    on-hover: "&7Check: &#FF450E%check% (%check-description%)%new-line%&7World: &#FF450E%world%%new-line%&7Cords: &#FF450E%x% %y% %z%%new-line%&7Client: &#FF450E%client-brand%"
    # Local placeholders: %teleport-location%
    # 点击聊天消息时执行的命令或动作；留空则不执行。
    on-click: "/zac teleport %teleport-location%"
  # 玩家被处罚时的游戏内广播配置。
  broadcast-punishments:
    # 是否启用该功能或检测项。
    enabled: true
    # 发送给玩家、管理员、控制台或外部服务的消息模板。
    message: "%prefix% %name% was punished for %check%"
    # Broadcasts punishments of a player no more than 1 time in X ms
    # 同类消息或动作的冷却时间，单位为毫秒。
    cooldown: 0
    # Leave this field empty not to hover any text
    # 鼠标悬停在聊天消息上时显示的文本；留空则不显示。
    on-hover: "&7Check: &#FF450E%check% (%check-description%)%new-line%&7World: &#FF450E%world%%new-line%&7Cords: &#FF450E%x% %y% %z%%new-line%&7Client: &#FF450E%client-brand%"
    # Local placeholders: %teleport-location%
    # 点击聊天消息时执行的命令或动作；留空则不执行。
    on-click: "/zac teleport %teleport-location%"

## Log file
# 违规和处罚日志文件配置。
log:
  # 是否启用该功能或检测项。
  enabled: true
  # 日志文件路径模板，可使用日期占位符。
  file: "logs/%date-day%.log"
  # Global placeholders: %prefix%, %version%, %name%, %uuid%, %ip%,
  # %check%, %check-type%, %check-description%
  # %vio%, %punishment-vio%, %setback-vio%,
  # %tps%, %%edition%, %ping%, %connection-stability%,
  # %world%, %x%, %y%, %z%, %client-brand%
  # %date-day%, %date-hrs%, %date-min%, %date-sec%
  # 违规事件写入日志的配置。
  log-violations:
    # 是否启用该功能或检测项。
    enabled: true
    # 发送给玩家、管理员、控制台或外部服务的消息模板。
    message: "(%date-sec%) %name% was flagged [Check: %check% (%check-description%)] [Violations: %vio%/%punishment-vio%] [TPS: %tps%] [Ping: %ping%ms (%connection-stability% stability)] [Client: %client-brand%] [Location: %world% %x% %y% %z%]"
    # Logs violations of a player no more than every X 1 time in X ms
    # 同类消息或动作的冷却时间，单位为毫秒。
    cooldown: 1000
  # 处罚事件写入日志的配置。
  log-punishments:
    # 是否启用该功能或检测项。
    enabled: true
    # 发送给玩家、管理员、控制台或外部服务的消息模板。
    message: "(%date-sec%) %name% was punished [Check: %check% (%check-description%)] [Violations: %vio%/%punishment-vio%] [TPS: %tps%]  [Ping: %ping%ms (%connection-stability% stability)] [Client: %client-brand%] [Location: %world% %x% %y% %z%]"
    # Logs punishments of a player no more frequently than 1 time in X ms
    # 同类消息或动作的冷却时间，单位为毫秒。
    cooldown: 0

## Discord notifications of violations or/and punishments
# Discord Webhook 通知配置。
discord-webhook:
  # 是否启用该功能或检测项。
  enabled: false
  # You can create a webhook for your Discord server in
  # Server Settings -> Integrations -> Webhooks -> New Webhook
  # 向 Discord 发送违规通知的配置。
  send-violations:
    # 是否启用该功能或检测项。
    enabled: false
    # Discord Webhook 地址；留空则不会发送到 Discord。
    webhook-url: ""
    # 发送给玩家、管理员、控制台或外部服务的消息模板。
    message: "```%name% was flagged for %check% (%check-description%) (%vio%/%punishment-vio%)```"
    # 同类消息或动作的冷却时间，单位为毫秒。
    cooldown: 2000
  # 向 Discord 发送处罚通知的配置。
  send-punishments:
    # 是否启用该功能或检测项。
    enabled: false
    #This url can either be the same as the first one or different
    # Discord Webhook 地址；留空则不会发送到 Discord。
    webhook-url: ""
    # 发送给玩家、管理员、控制台或外部服务的消息模板。
    message: "```%name% was punished for %check% (%check-description%)```"
    # 同类消息或动作的冷却时间，单位为毫秒。
    cooldown: 0

## Bypass permissions
# 绕过权限相关配置。
permission:
  # 'zanticheat.bypess.flight_a' is a specific bypass permission
  # Whether the specific bypass permissions should be enabled
  # 是否启用按检测项划分的独立绕过权限。
  per-check-bypass-permission: false
  # If set to 'true', all the bypass permissions are disabled
  # 是否禁用全部绕过权限。
  disable-all-bypass-permissions: false

## Violation reset
# 违规计数生命周期配置。
violation:
  # 在线玩家违规计数定时重置配置。
  reset:
    # The interval in which violations are reset
    # 在线玩家违规计数自动重置间隔，单位为秒。
    reset-interval: 180
  # 玩家离线后的违规计数缓存配置。
  cache:
    # 是否启用该功能或检测项。
    enabled: true
    # Saves the player's violations for X seconds after the player leaves
    # If set to '0', the player's violation are reset when player quits
    # 玩家离线后保留违规计数的时长，单位为秒；0 表示退出即清除。
    cache-duration: 180

## Lag conditions under which the detection should be disabled
# 服务器或玩家处于高延迟时的检测保护配置。
lag-protection:
  # Stops the checks if the server doesn't respond for X ms
  # 服务器单 tick 响应超过该毫秒数时暂停检测。
  tick-threshold: 1000
  # Disables the checks on join for X ms
  # 玩家加入服务器后跳过检测的时间，单位为毫秒。
  ignore-time-on-join: 0
  # Disables the checks on teleportation to unloaded chunks for X ms
  # 玩家传送到未加载区块后跳过检测的时间，单位为毫秒。
  ignore-time-on-teleport: 0
  # Prevents gliding and riptiding players from entering into unloaded chunks
  # 是否阻止滑翔或激流状态玩家进入未加载区块。
  prevent-entering-into-unloaded-chucks: true
  # Slightly improves accuracy in laggy conditions
  # 是否在高延迟环境下优先降低误判而非提高检测强度。
  prioritize-accuracy: true

## Basically, there is no need to configure 'geyser-hook' selection,
## unless the Geyser player linking is enabled and uses a local database
# Geyser/Floodgate Bedrock 玩家识别配置。
geyser-hook:
  # 是否启用该功能或检测项。
  enabled: true
  # 通过 Floodgate API 识别 Bedrock 玩家的配置。
  floodgate:
    # Whether a player marked with Floodgate API 2.0+ counted as Bedrock players
    # 是否启用该功能或检测项。
    enabled: true
  # 通过 UUID 前缀识别 Bedrock 玩家的配置。
  uuid:
    # Whether a player whose UUID starts with '000000' counted as Bedrock players
    # 是否启用该功能或检测项。
    enabled: true
  # 通过玩家名前缀识别 Bedrock 玩家的配置。
  prefix:
    # Whether a player whose name starts with the prefix counted as Bedrock players
    # 是否启用该功能或检测项。
    enabled: true
    # 用于识别 Bedrock 玩家的玩家名前缀。
    prefix-string: "."

## Database storage for punished players
# Stores banned player UUIDs so other plugins can query them
# This records UUIDs, not player names
# Only punishments whose commands start with ban-related roots are stored
# (for example: ban, tempban, ban-ip, ipban)
# Leave this disabled unless MySQL is fully configured
# 处罚记录数据库存储配置。
database:
  # 是否启用该功能或检测项。
  enabled: true
  # MySQL 连接配置。
  mysql:
    # 服务主机地址。
    host: "127.0.0.1"
    # 服务端口。
    port: 3306
    # 数据库名称或 Redis 数据库编号。
    database: "minecraft"
    # 数据库用户名。
    username: "minecraft"
    # 连接密码；留空表示不使用密码。
    password: "mSWsJbZSe6Gy2aM6"
    # MySQL 高级连接参数。
    advanced:
      # Enable SSL and certificate verification when MySQL is not on the same trusted host/network
      # 是否为 MySQL 连接启用 SSL。
      ssl: false
      # 是否为 MySQL 连接启用 Unicode 支持。
      use-unicode: true
      # 是否校验 MySQL 服务端证书。
      verify-server-certificate: false
      # MySQL 连接使用的字符编码。
      character-encoding: "UTF-8"
      # MySQL 连接断开后是否自动重连。
      auto-reconnect: true
      # MySQL 自动重连最大尝试次数。
      max-reconnects: 3
    # 数据库初始化配置。
    init:
      # 启动时是否自动创建所需数据库表。
      create-tables: true

## Velocity group punishment sync
# Publishes ban punishments from child servers to the main server ZAC plugin
# Leave this disabled unless the Redis bridge is fully configured
# Velocity 多子服处罚同步配置。
velocity-support:
  # 是否启用该功能或检测项。
  enabled: true
  # 当前子服在跨服同步中的唯一标识。
  server-id: "lobby_1"
  # 当前服务器是否作为接收并执行主处罚命令的主服。
  main-server: false
  # 跨服同步模式，控制发布和消费处罚消息的行为。
  sync-mode: "publish_and_consume"
  # 主服收到同步处罚后执行的封禁命令模板。
  main-server-ban-command: "ban %name% Cheating detected by ZAC"
  # 跨服消息桥配置。
  message-bridge:
    # 消息桥实现类型。
    type: "redis"
    # Redis 发布/订阅频道名。
    channel: "zanticheat:velocity:ban"
    # 服务主机地址。
    host: "127.0.0.1"
    # 服务端口。
    port: 6379
    # Configure authentication and restrict network exposure when Redis is not localhost-only
    # 连接密码；留空表示不使用密码。
    password: "MfnFkCby92hNIh0j"
    # Redis 数据库编号。
    database: 0
    # 连接消息桥的超时时间，单位为毫秒。
    connect-timeout-ms: 3000
    # 发布同步消息的超时时间，单位为毫秒。
    publish-timeout-ms: 3000

## The update checker will let you know if a newer version is available
# 新版本检查配置。
update-checker:
  # 是否启用该功能或检测项。
  enabled: false
  # 更新通知展示配置。
  notification:
    # 控制台更新通知配置。
    console:
      # 是否启用该更新通知渠道。
      enabled: false
      # Local placeholders: %latest-version%
      # 发送给玩家、管理员、控制台或外部服务的消息模板。
      message: "%prefix% ZAntiCheat %latest-version% is available!"
    # 管理员进服更新通知配置。
    on-join:
      # 是否启用该更新通知渠道。
      enabled: false
      # Local placeholders: %latest-version%
      # 发送给玩家、管理员、控制台或外部服务的消息模板。
      message: "%prefix% ZAntiCheat %latest-version% is available!"
      # Whether 'zanticheat.alerts.notify' permission should be required
      # 是否要求玩家拥有通知权限才显示该消息。
      require-permission: true

# BStats is an anonymous way of getting the average metrics of the servers
# running the plugin. Check out ZAntiCheat's page on 'bstats.org'
# bStats 匿名统计配置。
bstats:
  # The plugin is completely free, and it's always nice to know that
  # it's useful for someone. If you care, don't disable the metrics
  # 是否启用该功能或检测项。
  enabled: true

## It's not recommended to disable the API unless it causes any issues
# 开发者 API 开关配置。
api:
  # Whether the developer API is enabled
  # The API may be used be other plugins
  # 是否启用该功能或检测项。
  enabled: true

# 所有反作弊检测项配置。
checks:
  # Movement checks
  # 移动类检测配置。
  movement:
    # 飞行检测组。
    flight:
      # flight_a 子检测项配置。
      flight_a:
        # Whether this check is enabled
        # 是否启用该功能或检测项。
        enabled: true
        # The punishment commands
        # 该检测项的处罚配置。
        punishment:
          # Should the punishment commands be executed
          # 是否在达到处罚阈值后执行处罚命令。
          punishable: true
          # After X violations, the punishment commands are run
          # 触发处罚命令所需的违规次数阈值。
          punishment-vio: 40
          # The commands
          # 达到处罚阈值后依次执行的控制台命令列表。
          commands:
            - "ban %name% fly"
        # The setback feature
        # 该检测项的回退/取消动作配置。
        setback:
          # If set to 'true', the player will be frozen on getting a violation
          # Notes: It's NOT recommended to use the setback because
          # 1. It will notify the hackers making the checks easier to bypass
          # 2. Using a punishment command is simply more efficient
          # 是否在触发违规后执行回退、冻结或取消动作。
          setback: false
          # After X violations, the player's actions should be cancelled
          # 触发回退或取消动作所需的违规次数阈值。
          setback-vio: 21
        # Exempts from flight_a check if the conditions are not satisfied
        # 该检测项的触发条件和算法阈值配置。
        detection:
          # If the server's TPS is lower than X, this check is bypassed
          # 服务器 TPS 低于该值时跳过该检测。
          min-tps: 5.0
          # If the player's ping is higher than X, this check is bypassed
          # The ping can't be higher than 10,000
          # 玩家延迟高于该值时跳过该检测，单位为毫秒。
          max-ping: 10000
          # Should the Java players be checked
          # 是否检测 Java 版玩家。
          java: true
          # Should the players who joined via Geyser be checked
          # 是否检测通过 Geyser/Floodgate 加入的 Bedrock 玩家。
          bedrock: true
      # flight_b 子检测项配置。
      flight_b:
        # 是否启用该功能或检测项。
        enabled: true
        # 该检测项的处罚配置。
        punishment:
          # 是否在达到处罚阈值后执行处罚命令。
          punishable: true
          # 触发处罚命令所需的违规次数阈值。
          punishment-vio: 40
          # 达到处罚阈值后依次执行的控制台命令列表。
          commands:
            - "ban %name% fly"
        # 该检测项的回退/取消动作配置。
        setback:
          # 是否在触发违规后执行回退、冻结或取消动作。
          setback: false
          # 触发回退或取消动作所需的违规次数阈值。
          setback-vio: 21
        # 该检测项的触发条件和算法阈值配置。
        detection:
          # 服务器 TPS 低于该值时跳过该检测。
          min-tps: 5.0
          # 玩家延迟高于该值时跳过该检测，单位为毫秒。
          max-ping: 10000
          # 是否检测 Java 版玩家。
          java: true
          # 是否检测通过 Geyser/Floodgate 加入的 Bedrock 玩家。
          bedrock: true
      # flight_c 子检测项配置。
      flight_c:
        # 是否启用该功能或检测项。
        enabled: true
        # 该检测项的处罚配置。
        punishment:
          # 是否在达到处罚阈值后执行处罚命令。
          punishable: true
          # 触发处罚命令所需的违规次数阈值。
          punishment-vio: 40
          # 达到处罚阈值后依次执行的控制台命令列表。
          commands:
            - "ban %name% fly"
        # 该检测项的回退/取消动作配置。
        setback:
          # 是否在触发违规后执行回退、冻结或取消动作。
          setback: false
          # 触发回退或取消动作所需的违规次数阈值。
          setback-vio: 21
        # 该检测项的触发条件和算法阈值配置。
        detection:
          # 服务器 TPS 低于该值时跳过该检测。
          min-tps: 5.0
          # 玩家延迟高于该值时跳过该检测，单位为毫秒。
          max-ping: 10000
          # 是否检测 Java 版玩家。
          java: true
          # 是否检测通过 Geyser/Floodgate 加入的 Bedrock 玩家。
          bedrock: true
    # 空中跳跃检测组。
    airjump:
      # airjump_a 子检测项配置。
      airjump_a:
        # 是否启用该功能或检测项。
        enabled: true
